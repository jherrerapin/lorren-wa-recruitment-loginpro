# CI — LoginPro WhatsApp Contingency
# Deploy gestionado por Railway directamente desde main.

name: CI

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (informativo)
    runs-on: ubuntu-latest
    # continue-on-error: no bloquea el pipeline por warnings/errores de lint
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npm run prisma:generate

      - name: Lint (solo informativo — no bloquea)
        run: |
          if [ ! -f .eslintrc.json ] && [ ! -f eslint.config.js ] && [ ! -f .eslintrc.cjs ]; then
            echo '{"env":{"node":true,"es2022":true},"parserOptions":{"ecmaVersion":2022,"sourceType":"module"},"rules":{"no-unused-vars":["warn",{"argsIgnorePattern":"^_"}],"no-undef":"error","no-console":"off"}}' > .eslintrc.json
          fi
          npx eslint src/ --ext .js || true

  # ───────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: loginpro_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loginpro_test
      SESSION_SECRET: ci-test-secret-not-for-production
      WHATSAPP_PHONE_NUMBER_ID: test_phone_id
      WHATSAPP_ACCESS_TOKEN: test_token
      WHATSAPP_VERIFY_TOKEN: test_verify
      OPENAI_API_KEY: sk-test-placeholder-not-real

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npm run prisma:generate

      - name: Aplicar migraciones
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/loginpro_test

      - name: Correr tests
        run: npm test

  # ───────────────────────────────────────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build imagen (sin push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: loginpro-wa-contingency:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke test
        run: |
          docker run -d --name smoke \
            -e NODE_ENV=production \
            -e SESSION_SECRET=smoke \
            -e DATABASE_URL=postgresql://x:x@localhost/x \
            -e WHATSAPP_PHONE_NUMBER_ID=x \
            -e WHATSAPP_ACCESS_TOKEN=x \
            -e WHATSAPP_VERIFY_TOKEN=x \
            -e OPENAI_API_KEY=sk-placeholder \
            -p 3001:3000 \
            loginpro-wa-contingency:ci-${{ github.sha }}
          sleep 5
          docker ps --filter name=smoke --filter status=running | grep smoke || (docker logs smoke && exit 1)
          docker stop smoke
