# deploy.yml eliminado — Railway gestiona el deploy directamente desde la rama main.
# Este archivo existe solo para evitar referencias rotas. No ejecuta ningún job.

name: Deploy (disabled — managed by Railway)

on:
  workflow_dispatch:
    inputs:
      noop:
        description: 'Railway gestiona el deploy. Este workflow no hace nada.'
        required: false

jobs:
  noop:
    name: No-op (Railway deploys automatically)
    runs-on: ubuntu-latest
    steps:
      - name: Info
        run: echo "Deploy gestionado por Railway desde main. Ver https://railway.app"
